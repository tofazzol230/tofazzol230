name: Generate Snake

on:
  schedule: 
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: Platane/snk@master
        with:
          github_user_name: mdrahats
          outputs: dist/snake.svg
      - name: Push Snake
        uses: EndBug/add-and-commit@v7
        with:
          message: "update snake"
          add: "dist/snake.svg"
